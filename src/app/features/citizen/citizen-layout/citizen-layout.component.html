
<div class="citizen">

  <!-- Sidebar gauche -->
  <aside class="sidebar">
    <!-- Profil utilisateur -->
    <div class="sidebar__user">
      <div class="sidebar__avatar">{{ getInitial() }}</div>
      <div>
        <p class="sidebar__name">{{ getFullName() }}</p>
        <p class="sidebar__role">{{ getRoleLabel() }}</p>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar__nav">
      <a
        routerLink="/citizen/dashboard"
        routerLinkActive="sidebar__link--active"
        class="sidebar__link"
      >
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
        </svg>
        Tableau de bord
      </a>

      <a
        routerLink="/citizen/my-resources"
        routerLinkActive="sidebar__link--active"
        class="sidebar__link"
      >
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"/>
        </svg>
        Mes ressources
      </a>

      <a
        routerLink="/citizen/favorites"
        routerLinkActive="sidebar__link--active"
        class="sidebar__link"
      >
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/>
        </svg>
        Favoris
      </a>

      <a
        routerLink="/citizen/profile"
        routerLinkActive="sidebar__link--active"
        class="sidebar__link"
      >
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
        </svg>
        Profil
      </a>

      <a routerLink="/home" class="sidebar__link sidebar__link--home">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
        </svg>
        Retour au site
      </a>
    </nav>
  </aside>

  <!-- Contenu principal -->
  <main class="citizen__content">
    <router-outlet />
  </main>

</div>
