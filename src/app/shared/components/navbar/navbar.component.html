<nav class="navbar">
  <!-- Logo -->
  <a class="navbar__brand" routerLink="/home">
    <div class="navbar__brand-logo">
      <img src="logo-RR-cesi.png" alt="Logo" />
    </div>
    <span class="navbar__brand-name">Ressources Citoyennes</span>
  </a>

  <!-- Liens de navigation (non affichés en backoffice) -->
  @if (!isBackoffice()) {
  <div class="navbar__nav">
    <a routerLink="/home" routerLinkActive="active">Accueil</a>
    <a routerLink="/resources" routerLinkActive="active">Catalogue</a>
  </div>
  }

  <!-- Actions droite -->
  <div class="navbar__actions">

    <!-- === VUE BACKOFFICE === -->
    @if (isBackoffice()) {
    <a routerLink="/citizen/resources/create" class="navbar__btn navbar__btn--create">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
        <path d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" />
      </svg>
      Créer une ressource
    </a>

    <button class="navbar__btn navbar__btn--logout" (click)="logout()" title="Se déconnecter">
      <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
        <path fill-rule="evenodd"
          d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h7a1 1 0 000-2H4V5h6a1 1 0 000-2H3zm10.293 4.293a1 1 0 011.414 0L17 9.586l-2.293 2.293a1 1 0 01-1.414-1.414L14.586 9l-1.293-1.293a1 1 0 010-1.414z"
          clip-rule="evenodd" />
        <path fill-rule="evenodd" d="M7 9a1 1 0 011-1h8a1 1 0 010 2H8a1 1 0 01-1-1z" clip-rule="evenodd" />
      </svg>
    </button>
    }

    <!-- === NON CONNECTÉ === -->
    @else if (!isAuthenticated()) {
    <a routerLink="/auth/login" class="navbar__btn navbar__btn--ghost">Connexion</a>
    <a routerLink="/auth/register" class="navbar__btn navbar__btn--primary">S'inscrire</a>
    }

    <!-- === CONNECTÉ === -->
    @else {
    <!-- Administration -->
    @if ( isSuperAdmin()) {
    <button class="navbar__btn navbar__btn--ghost" (click)="navigateToBackoffice()">
      Super Administration
    </button>
    }

    @if ( isAdmin() ) {
    <button class="navbar__btn navbar__btn--ghost" (click)="navigateToBackoffice()">
      Administration
    </button>
    }

    @if (isModerator() ) {
    <button class="navbar__btn navbar__btn--ghost" (click)="navigateToBackoffice()">
      Moderateur
    </button>
    }

    <!-- USER + LOGOUT -->
    <div class="navbar__user">

      <!-- Profil (clic → citizen) -->
      <button class="navbar__btn navbar__btn--user" (click)="goToCitizen()">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
        </svg>
        {{ getUserFullName() }}
      </button>

      <!-- Logout -->
      <button class="navbar__btn navbar__btn--logout" (click)="logout()" title="Se déconnecter">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path fill-rule="evenodd"
            d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h7a1 1 0 000-2H4V5h6a1 1 0 000-2H3zm10.293 4.293a1 1 0 011.414 0L17 9.586l-2.293 2.293a1 1 0 01-1.414-1.414L14.586 9l-1.293-1.293a1 1 0 010-1.414z"
            clip-rule="evenodd" />
          <path fill-rule="evenodd" d="M7 9a1 1 0 011-1h8a1 1 0 010 2H8a1 1 0 01-1-1z" clip-rule="evenodd" />
        </svg>
      </button>

    </div>
    }

  </div>
</nav>
